<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PAB - Emergency Responder Console</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700;900&family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#080c10; --bg2:#0d1318; --bg3:#111820;
    --border:#1e2d3a; --border2:#243646;
    --red:#ff2d3b; --red-dim:#7a1520;
    --amber:#ffaa00; --amber-dim:#6b4600;
    --green:#00e5a0; --green-dim:#004d38;
    --cyan:#00c8ff; --cyan-dim:#003d52;
    --text:#c8dde9; --text-dim:#4e6475; --text-mid:#7a9ab0;
    --mono:'Share Tech Mono',monospace;
    --sans:'Barlow',sans-serif;
    --cond:'Barlow Condensed',sans-serif;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden}
  body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px)}

  /* ── Layout ── */
  #app{display:grid;grid-template-rows:52px 1fr;grid-template-columns:360px 1fr;height:100vh;gap:1px;background:var(--border)}

  /* ── Top bar ── */
  #topbar{grid-column:1/-1;background:var(--bg2);display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid var(--border)}
  .logo{font-family:var(--cond);font-weight:900;font-size:22px;letter-spacing:.12em;color:var(--red);text-shadow:0 0 18px rgba(255,45,59,.5)}
  .logo span{color:var(--text-mid);font-weight:400}
  #clock{font-family:var(--mono);font-size:13px;color:var(--cyan);letter-spacing:.08em}
  #conn-status{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--text-dim)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--text-dim);transition:background .3s,box-shadow .3s}
  .dot.live{background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
  .dot.error{background:var(--red);box-shadow:0 0 8px var(--red)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* ── Sidebar ── */
  #sidebar{background:var(--bg2);display:flex;flex-direction:column;overflow:hidden}
  .panel-header{padding:12px 16px;font-family:var(--cond);font-weight:700;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  #alert-count{background:var(--red);color:#fff;font-family:var(--mono);font-size:10px;padding:1px 7px;border-radius:10px;display:none}
  #alert-list{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:8px}
  #alert-list::-webkit-scrollbar{width:4px}
  #alert-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
  .alert-card{background:var(--bg3);border:1px solid var(--border2);border-left:3px solid var(--amber);border-radius:4px;padding:12px;cursor:pointer;transition:border-color .2s,background .2s;animation:slideIn .3s ease}
  @keyframes slideIn{from{opacity:0;transform:translateY(-8px)}}
  .alert-card:hover{background:#141d28}
  .alert-card.priority-high{border-left-color:var(--red)}
  .alert-card.priority-medium{border-left-color:var(--amber)}
  .alert-card.priority-low{border-left-color:var(--green)}
  .alert-card.active{background:#0e1c27;border-color:var(--cyan);border-left-color:var(--cyan)}
  .card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .priority-badge{font-family:var(--cond);font-weight:700;font-size:10px;letter-spacing:.15em;padding:2px 8px;border-radius:2px;text-transform:uppercase}
  .priority-badge.high{background:rgba(255,45,59,.15);color:var(--red)}
  .priority-badge.medium{background:rgba(255,170,0,.15);color:var(--amber)}
  .priority-badge.low{background:rgba(0,229,160,.15);color:var(--green)}
  .card-id{font-family:var(--mono);font-size:10px;color:var(--text-dim)}
  .card-transcript{font-size:12px;color:var(--text-mid);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px}
  .card-actions{display:flex;gap:6px}
  .btn{flex:1;padding:7px 12px;font-family:var(--cond);font-weight:700;font-size:11px;letter-spacing:.1em;border:1px solid;border-radius:3px;cursor:pointer;transition:all .15s;text-transform:uppercase}
  .btn-accept{background:rgba(0,229,160,.08);color:var(--green);border-color:var(--green-dim)}
  .btn-accept:hover{background:rgba(0,229,160,.2);box-shadow:0 0 10px rgba(0,229,160,.2)}
  .btn-accept:disabled{opacity:.4;cursor:not-allowed}
  .card-time{font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-top:6px}
  .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text-dim);font-family:var(--mono);font-size:12px;text-align:center;padding:20px}
  .empty-icon{font-size:36px;opacity:.3}

  /* ── Main panel ── */
  #main{background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
  #incident-header{padding:12px 20px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;min-height:52px}
  #incident-title{font-family:var(--cond);font-weight:900;font-size:18px;letter-spacing:.08em;color:var(--text);flex:1}
  #incident-title.idle{color:var(--text-dim);font-weight:400;font-size:14px}
  #incident-meta{font-family:var(--mono);font-size:11px;color:var(--text-dim)}
  .status-pill{font-family:var(--mono);font-size:10px;letter-spacing:.1em;padding:3px 10px;border-radius:12px;text-transform:uppercase}
  .status-pill.idle{background:rgba(78,100,117,.15);color:var(--text-dim);border:1px solid var(--border)}
  .status-pill.live{background:rgba(255,45,59,.1);color:var(--red);border:1px solid var(--red-dim);animation:pulse 2s infinite}
  .status-pill.connected{background:rgba(0,229,160,.1);color:var(--green);border:1px solid var(--green-dim)}
  .status-pill.closed{background:rgba(0,200,255,.08);color:var(--cyan);border:1px solid var(--cyan-dim)}

  /* ── Triage panel ── */
  #triage-panel{
    background:var(--bg2);border-bottom:1px solid var(--border);
    padding:12px 20px;display:none;flex-direction:column;gap:10px;
    animation:fadeUp .3s ease;
  }
  #triage-panel.show{display:flex}
  #triage-header{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  #triage-badge{
    font-family:var(--cond);font-weight:900;font-size:20px;
    padding:4px 14px;border-radius:4px;border:2px solid;
    text-transform:uppercase;letter-spacing:.1em;
    transition:all .3s;
  }
  #triage-label{font-family:var(--mono);font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em}
  #triage-confidence{font-family:var(--mono);font-size:10px;color:var(--cyan);margin-left:auto}
  
  #triage-body{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .triage-section-title{font-family:var(--cond);font-weight:700;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px}
  
  #keywords-list{display:flex;flex-wrap:wrap;gap:5px}
  .kw-tag{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:2px;border:1px solid;text-transform:uppercase;font-weight:bold;letter-spacing:.05em}
  .kw-tag.red{background:rgba(255,45,59,.12);color:var(--red);border-color:rgba(255,45,59,.35)}
  .kw-tag.orange{background:rgba(255,170,0,.12);color:var(--amber);border-color:rgba(255,170,0,.35)}
  .kw-tag.blue{background:rgba(0,200,255,.1);color:var(--cyan);border-color:rgba(0,200,255,.3)}

  #issues-list{display:flex;flex-direction:column;gap:4px}
  .issue-item{
    font-family:var(--mono);font-size:11px;color:var(--red);
    padding:4px 8px;background:rgba(255,45,59,.06);
    border:1px solid rgba(255,45,59,.2);border-radius:3px;
    display:flex;align-items:center;gap:6px;
  }
  .issue-item::before{content:'⚠';font-size:10px}

  #actions-list{display:flex;flex-direction:column;gap:4px}
  .action-item{
    font-family:var(--mono);font-size:11px;color:var(--green);
    padding:5px 10px;background:rgba(0,229,160,.05);
    border:1px solid rgba(0,229,160,.15);border-radius:3px;
    display:flex;align-items:center;gap:6px;line-height:1.4;
  }
  .action-item::before{content:'→';color:var(--green-dim)}

  /* ── Waveform ── */
  #waveform{height:36px;display:flex;align-items:center;justify-content:center;gap:3px;padding:0 20px;background:var(--bg2);border-bottom:1px solid var(--border);opacity:0;transition:opacity .3s;flex-shrink:0}
  #waveform.active{opacity:1}
  .wave-bar{width:3px;background:var(--cyan);border-radius:2px;opacity:.7;animation:wave 1s ease-in-out infinite}
  @keyframes wave{0%,100%{height:4px}50%{height:20px}}

  /* ── Transcript ── */
  #transcript-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
  #transcript-log{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px;font-family:var(--mono);font-size:13px}
  #transcript-log::-webkit-scrollbar{width:4px}
  #transcript-log::-webkit-scrollbar-thumb{background:var(--border2)}
  .transcript-entry{display:flex;gap:12px;animation:fadeUp .25s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}}
  .entry-ts{color:var(--text-dim);flex-shrink:0;font-size:11px;padding-top:2px}
  .entry-bubble{background:var(--bg2);border:1px solid var(--border2);border-radius:4px;padding:8px 12px;flex:1;color:var(--text);line-height:1.6}
  .entry-bubble.system{background:transparent;border:none;color:var(--text-dim);font-size:11px;padding:2px 0}
  .entry-bubble.initial{border-color:var(--amber-dim);background:rgba(255,170,0,.04)}
  .entry-bubble .speaker{color:var(--cyan);font-size:11px;margin-bottom:2px;display:block}
  #idle-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--text-dim)}
  .idle-ring{width:80px;height:80px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:30px;position:relative}
  .idle-ring::before{content:'';position:absolute;inset:-8px;border-radius:50%;border:1px solid var(--border);animation:spinRing 6s linear infinite;border-top-color:var(--text-dim)}
  @keyframes spinRing{to{transform:rotate(360deg)}}
  .idle-label{font-family:var(--cond);font-size:13px;letter-spacing:.2em;text-transform:uppercase}

  /* ── Status bar ── */
  #statusbar{background:var(--bg2);border-top:1px solid var(--border);padding:6px 20px;display:flex;gap:24px;align-items:center;font-family:var(--mono);font-size:10px;color:var(--text-dim);flex-wrap:wrap;flex-shrink:0}
  .sb-item{display:flex;gap:6px;align-items:center}
  .sb-val{color:var(--text-mid)}

  /* ── Overlays ── */
  #flash{position:fixed;inset:0;pointer-events:none;z-index:100;background:rgba(255,45,59,.06);opacity:0;transition:opacity .1s}
  #flash.on{opacity:1}
  #toast-container{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
  .toast{background:var(--bg3);border:1px solid var(--border2);border-left:3px solid var(--green);padding:10px 16px;border-radius:4px;font-family:var(--mono);font-size:11px;color:var(--text);animation:toastIn .2s ease;max-width:340px}
  .toast.error{border-left-color:var(--red)}
  @keyframes toastIn{from{opacity:0;transform:translateX(20px)}}
</style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <div class="logo">PAB <span>/ Emergency Responder Console</span></div>
    <div id="clock">--:--:--</div>
    <div id="conn-status">
      <div class="dot" id="conn-dot"></div>
      <span id="conn-label">CONNECTING…</span>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="panel-header">
      Active Alerts
      <span id="alert-count">0</span>
    </div>
    <div id="alert-list">
      <div class="empty-state" id="empty-alerts">
        <div class="empty-icon">📡</div>
        <div>Monitoring for incoming alerts</div>
      </div>
    </div>
  </div>

  <!-- MAIN PANEL -->
  <div id="main">

    <!-- Incident header -->
    <div id="incident-header">
      <div id="incident-title" class="idle">No active incident</div>
      <div id="incident-meta"></div>
      <div class="status-pill idle" id="status-pill">STANDBY</div>
    </div>

    <!-- Triage panel -->
    <div id="triage-panel">
      <div id="triage-header">
        <div id="triage-badge">—</div>
        <div>
          <div id="triage-label">AWAITING ASSESSMENT</div>
          <div id="triage-confidence"></div>
        </div>
      </div>
      <div id="triage-body">
        <div>
          <div class="triage-section-title">Detected Keywords</div>
          <div id="keywords-list"></div>
          <div id="issues-list" style="margin-top:8px"></div>
        </div>
        <div>
          <div class="triage-section-title">Recommended Actions</div>
          <div id="actions-list"></div>
        </div>
      </div>
    </div>

    <!-- Waveform -->
    <div id="waveform"></div>

    <!-- Transcript area -->
    <div id="transcript-wrap">
      <div id="idle-screen">
        <div class="idle-ring">📻</div>
        <div class="idle-label">Awaiting dispatch</div>
      </div>
      <div id="transcript-log" style="display:none;"></div>
    </div>

    <!-- Status bar -->
    <div id="statusbar">
      <div class="sb-item">SERVER <span class="sb-val" id="sb-server">—</span></div>
      <div class="sb-item">SSE CLIENTS <span class="sb-val" id="sb-clients">—</span></div>
      <div class="sb-item">LAST EVENT <span class="sb-val" id="sb-last">—</span></div>
      <div class="sb-item">INCIDENTS <span class="sb-val" id="sb-total">0</span></div>
      <div class="sb-item">GATEWAY <span class="sb-val" id="sb-gateway">—</span></div>
    </div>
  </div>

</div>
<div id="flash"></div>
<div id="toast-container"></div>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────
const SERVER     = window.location.origin;
const SSE_URL    = SERVER + '/stream';
const HEALTH_URL = SERVER + '/health';
const INC_URL    = SERVER + '/incidents';

// ─── Triage definitions (SCDF-style) ─────────────────────────────────────────
const TRIAGE_LEVELS = {
  'P1+': { color:'#ff0000', bg:'rgba(255,0,0,0.12)',    label:'IMMEDIATELY LIFE-THREATENING' },
  'P1':  { color:'#ff3b3b', bg:'rgba(255,59,59,0.10)',  label:'CRITICAL EMERGENCY' },
  'P2':  { color:'#ff8c00', bg:'rgba(255,140,0,0.10)',  label:'EMERGENCY' },
  'P3':  { color:'#f0c040', bg:'rgba(240,192,64,0.08)', label:'AMBULATORY' },
  'P4':  { color:'#00c87a', bg:'rgba(0,200,122,0.08)',  label:'NON-EMERGENCY' },
};

// keyword → colour class
const KWMAP = {
  'chest pain':'red','cardiac':'red','heart attack':'red','unconscious':'red',
  'not breathing':'red','cannot breathe':'red','collapsed':'red','stroke':'red',
  'bleeding':'red','haemorrhage':'red','seizure':'red','overdose':'red',
  'suicide':'red','self-harm':'red','gunshot':'red','stabbing':'red',
  'fire':'red','burn':'red','electrocution':'red','drowning':'red',
  'choking':'red','asphyxiation':'red','heatstroke':'red','hypothermia':'red',
  'ambulance':'red','emergency':'red',
  'breathing':'orange','shortness of breath':'orange','difficulty breathing':'orange',
  'chest':'orange','pain':'orange','fell':'orange','fall':'orange',
  'dizzy':'orange','faint':'orange','vomit':'orange','weak':'orange',
  'confused':'orange','fever':'orange','infection':'orange','allergic':'orange',
  'asthma':'orange','attack':'orange','hurt':'orange','injured':'orange',
  'hospital':'orange','doctor':'orange','help':'orange',
  'alone':'blue','scared':'blue','medication':'blue','prescription':'blue',
};

// ─── State ────────────────────────────────────────────────────────────────────
const incidents = {};
let activeIncidentId = null;
let es = null;

// ─── DOM refs ─────────────────────────────────────────────────────────────────
const $clock         = document.getElementById('clock');
const $connDot       = document.getElementById('conn-dot');
const $connLabel     = document.getElementById('conn-label');
const $alertList     = document.getElementById('alert-list');
const $alertCount    = document.getElementById('alert-count');
const $emptyAlerts   = document.getElementById('empty-alerts');
const $incTitle      = document.getElementById('incident-title');
const $incMeta       = document.getElementById('incident-meta');
const $statusPill    = document.getElementById('status-pill');
const $idleScreen    = document.getElementById('idle-screen');
const $transcriptLog = document.getElementById('transcript-log');
const $waveform      = document.getElementById('waveform');
const $triagePanel   = document.getElementById('triage-panel');
const $triageBadge   = document.getElementById('triage-badge');
const $triageLabel   = document.getElementById('triage-label');
const $triageConf    = document.getElementById('triage-confidence');
const $keywordsList  = document.getElementById('keywords-list');
const $issuesList    = document.getElementById('issues-list');
const $actionsList   = document.getElementById('actions-list');
const $sbServer      = document.getElementById('sb-server');
const $sbClients     = document.getElementById('sb-clients');
const $sbLast        = document.getElementById('sb-last');
const $sbTotal       = document.getElementById('sb-total');
const $sbGateway     = document.getElementById('sb-gateway');
const $flash         = document.getElementById('flash');

// ─── Clock ────────────────────────────────────────────────────────────────────
function updateClock(){ $clock.textContent = new Date().toUTCString().split(' ')[4] + ' UTC'; }
setInterval(updateClock, 1000); updateClock();
$sbServer.textContent = window.location.host;

// ─── Toast ────────────────────────────────────────────────────────────────────
function toast(msg, type) {
  const el = document.createElement('div');
  el.className = 'toast' + (type === 'error' ? ' error' : '');
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// ─── Flash ────────────────────────────────────────────────────────────────────
function flashAlert() {
  $flash.classList.add('on');
  setTimeout(() => $flash.classList.remove('on'), 300);
}

// ─── Waveform ─────────────────────────────────────────────────────────────────
(function(){
  for (let i = 0; i < 36; i++) {
    const b = document.createElement('div');
    b.className = 'wave-bar';
    b.style.animationDelay = (i * 0.04).toFixed(2) + 's';
    b.style.animationDuration = (0.6 + Math.random() * 0.7).toFixed(2) + 's';
    $waveform.appendChild(b);
  }
})();
function setWaveActive(on) { $waveform.classList.toggle('active', on); }

// ─── Status helpers ───────────────────────────────────────────────────────────
function setStatus(cls, label) { $statusPill.className = 'status-pill ' + cls; $statusPill.textContent = label; }
function setConnStatus(ok) {
  $connDot.className = 'dot' + (ok ? ' live' : ' error');
  $connLabel.textContent = ok ? 'STREAM LIVE' : 'DISCONNECTED';
}

// ─── Triage panel ─────────────────────────────────────────────────────────────
function updateTriagePanel(data) {
  if (!data) { $triagePanel.classList.remove('show'); return; }

  const level      = data.triage_level || null;
  const keywords   = data.keywords || data.detected_keywords || [];
  const issues     = data.possible_issues || [];
  const actions    = data.actions || data.recommended_actions || [];
  const confidence = typeof data.confidence === 'number' ? data.confidence : null;

  // If no triage data at all, hide
  if (!level && !keywords.length && !actions.length) {
    $triagePanel.classList.remove('show');
    return;
  }

  // Badge
  const t = TRIAGE_LEVELS[level] || { color: 'var(--text-dim)', bg: 'transparent', label: 'UNKNOWN' };
  $triageBadge.textContent    = level || '—';
  $triageBadge.style.color     = t.color;
  $triageBadge.style.background= t.bg;
  $triageBadge.style.borderColor = t.color;
  $triageLabel.textContent    = t.label;
  $triageConf.textContent     = confidence !== null ? 'Confidence: ' + (confidence * 100).toFixed(1) + '%' : '';
  $triageConf.style.display   = confidence !== null ? 'block' : 'none';

  // Keywords
  $keywordsList.innerHTML = '';
  keywords.forEach(function(kw) {
    const span = document.createElement('span');
    const col = KWMAP[kw.toLowerCase()] || 'blue';
    span.className = 'kw-tag ' + col;
    span.textContent = kw.toUpperCase();
    $keywordsList.appendChild(span);
  });

  // Possible issues
  $issuesList.innerHTML = '';
  issues.forEach(function(issue) {
    const div = document.createElement('div');
    div.className = 'issue-item';
    div.textContent = issue;
    $issuesList.appendChild(div);
  });

  // Actions
  $actionsList.innerHTML = '';
  actions.forEach(function(action) {
    const div = document.createElement('div');
    div.className = 'action-item';
    div.textContent = action;
    $actionsList.appendChild(div);
  });

  $triagePanel.classList.add('show');
}

// ─── Transcript helpers ───────────────────────────────────────────────────────
function showTranscriptPanel() {
  $idleScreen.style.display = 'none';
  $transcriptLog.style.display = 'flex';
}

function addTranscriptEntry(text, type, tsOverride) {
  type = type || 'normal';
  showTranscriptPanel();
  const entry = document.createElement('div');
  entry.className = 'transcript-entry';
  const tsStr = tsOverride ? new Date(tsOverride).toTimeString().slice(0,8) : new Date().toTimeString().slice(0,8);
  let cls = 'entry-bubble';
  if (type === 'system')  cls += ' system';
  if (type === 'initial') cls += ' initial';
  let inner = text;
  const m = text.match(/^<([^>]+)>:\s*/);
  if (m && type !== 'system') inner = '<span class="speaker">' + m[1] + '</span>' + text.slice(m[0].length);
  entry.innerHTML = '<div class="entry-ts">' + tsStr + '</div><div class="' + cls + '">' + inner + '</div>';
  $transcriptLog.appendChild(entry);
  $transcriptLog.scrollTop = $transcriptLog.scrollHeight;
  $sbLast.textContent = new Date().toTimeString().slice(0,8);
}

// ─── Incident management ──────────────────────────────────────────────────────
function getOrCreateIncident(data) {
  const id = data.event_id || data.incident_id;
  if (!id) return null;
  if (incidents[id]) {
    // Merge new triage data if present
    if (data.triage_level || data.keywords || data.actions) {
      incidents[id].data = Object.assign({}, incidents[id].data, data);
      if (activeIncidentId === id) updateTriagePanel(incidents[id].data);
    }
    return id;
  }
  incidents[id] = { data: data, transcripts: [] };
  renderCard(id);
  flashAlert();
  updateAlertCount();
  $sbTotal.textContent = Object.keys(incidents).length;
  if (Object.keys(incidents).length === 1) activateIncident(id);
  return id;
}

function renderCard(id) {
  const inc = incidents[id];
  const d = inc.data;
  const priority = (d.priority || 'medium').toLowerCase();
  const shortId = id.slice(0,8).toUpperCase();
  const transcript = d.transcription || d.initial_transcript || d.text || '';
  const ts = d.ts ? new Date(d.ts).toLocaleTimeString() : new Date().toLocaleTimeString();

  const card = document.createElement('div');
  card.className = 'alert-card priority-' + priority;
  card.dataset.id = id;
  card.innerHTML =
    '<div class="card-top"><span class="priority-badge ' + priority + '">' + priority + '</span><span class="card-id">#' + shortId + '</span></div>' +
    '<div class="card-transcript">' + (transcript || '(no transcript)') + '</div>' +
    '<div class="card-actions"><button class="btn btn-accept">▶ Accept</button></div>' +
    '<div class="card-time">' + ts + '</div>';

  card.querySelector('.btn-accept').addEventListener('click', function(e) { e.stopPropagation(); acceptIncident(id); });
  card.addEventListener('click', function() { activateIncident(id); });

  $emptyAlerts.style.display = 'none';
  $alertList.prepend(card);
  inc.card = card;
}

function updateAlertCount() {
  const n = Object.keys(incidents).length;
  $alertCount.textContent = n;
  $alertCount.style.display = n > 0 ? 'inline-block' : 'none';
}

function activateIncident(id) {
  activeIncidentId = id;
  const inc = incidents[id];
  if (!inc) return;

  document.querySelectorAll('.alert-card').forEach(function(c) { c.classList.remove('active'); });
  if (inc.card) inc.card.classList.add('active');

  const priority = (inc.data.priority || '').toUpperCase();
  $incTitle.textContent = 'INC-' + id.slice(0,8).toUpperCase();
  $incTitle.classList.remove('idle');
  $incMeta.textContent = 'PRIORITY: ' + priority + '  |  ZONE: ' + (inc.data.zone_id || 'N/A') + '  |  CALLER: ' + (inc.data.caller_id || 'unknown');

  $transcriptLog.innerHTML = '';
  if (inc.transcripts.length) {
    showTranscriptPanel();
    inc.transcripts.forEach(function(t) { addTranscriptEntry(t.text, t.type, t.ts); });
  } else {
    $transcriptLog.style.display = 'none';
    $idleScreen.style.display = 'flex';
    $idleScreen.querySelector('.idle-label').textContent = 'Waiting for accept…';
  }

  updateTriagePanel(inc.data);
}

// ─── Accept ───────────────────────────────────────────────────────────────────
async function acceptIncident(id) {
  const inc = incidents[id];
  if (!inc) return;
  const btn = inc.card && inc.card.querySelector('.btn-accept');
  if (btn) btn.disabled = true;
  setStatus('live', 'CONNECTING…');
  activateIncident(id);
  try {
    const res = await fetch('/incident/' + id + '/accept', { method: 'POST' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    toast('Incident ' + id.slice(0,8).toUpperCase() + ' accepted');
    setStatus('connected', 'LIVE');
    setWaveActive(true);
    const initText = json.initial_transcript || inc.data.transcription;
    if (initText) {
      inc.transcripts.push({ text: initText, type: 'initial', ts: inc.data.ts });
      if (activeIncidentId === id) addTranscriptEntry(initText, 'initial', inc.data.ts);
    }
    if (json.ws_url) connectWS(id);
  } catch (err) {
    toast('Accept failed: ' + err.message, 'error');
    setStatus('closed', 'ERROR');
    if (btn) btn.disabled = false;
  }
}

// ─── WebSocket ────────────────────────────────────────────────────────────────
function connectWS(incidentId) {
  const proxyUrl = SERVER.replace(/^http/, 'ws') + '/ws/call/' + incidentId;
  const ws = new WebSocket(proxyUrl);
  ws.binaryType = 'arraybuffer';
  ws.onopen  = function() { addTranscriptEntry('— Connected to live call —', 'system'); };
  ws.onerror = function() { addTranscriptEntry('— WebSocket error —', 'system'); };
  ws.onclose = function() {
    addTranscriptEntry('— Call ended —', 'system');
    setStatus('closed', 'CLOSED');
    setWaveActive(false);
  };
  ws.onmessage = function(e) {
    if (typeof e.data !== 'string') return;
    try { handleWsMessage(incidentId, JSON.parse(e.data)); } catch {}
  };
}

function handleWsMessage(incidentId, msg) {
  if (msg.type === 'transcript') {
    const text = msg.text || '';
    const inc = incidents[incidentId];
    if (inc) inc.transcripts.push({ text: text, type: 'normal', ts: msg.ts });
    if (activeIncidentId === incidentId) addTranscriptEntry(text, 'normal', msg.ts);
    // Trigger triage update if triage data bundled with transcript
    if (msg.triage_level && inc) {
      inc.data = Object.assign({}, inc.data, msg);
      if (activeIncidentId === incidentId) updateTriagePanel(inc.data);
    }
  } else if (msg.type === 'connected') {
    addTranscriptEntry('— Handshake OK  priority=' + msg.priority + '  zone=' + msg.zone_id + ' —', 'system');
  } else if (msg.type === 'triage') {
    // Dedicated triage update message
    const inc = incidents[incidentId];
    if (inc) {
      inc.data = Object.assign({}, inc.data, msg);
      if (activeIncidentId === incidentId) updateTriagePanel(inc.data);
    }
  } else if (msg.type === 'emergency_disconnected') {
    addTranscriptEntry('— Emergency caller disconnected —', 'system');
    setStatus('closed', 'ENDED');
    setWaveActive(false);
  }
}

// ─── SSE ──────────────────────────────────────────────────────────────────────
function connectSSE() {
  if (es) { try { es.close(); } catch {} es = null; }
  es = new EventSource(SSE_URL);

  es.addEventListener('connected', function() { setConnStatus(true); toast('SSE stream connected'); });

  es.onmessage = function(e) {
    var data;
    try { data = JSON.parse(e.data); } catch { return; }
    $sbLast.textContent = new Date().toTimeString().slice(0,8);

    // New alert webhook
    if (data.event_id && !data.type) { getOrCreateIncident(data); return; }

    if (data.type === 'accepted') {
      const inc = incidents[data.incident_id];
      if (inc) {
        setStatus('connected', 'LIVE'); setWaveActive(true);
        if (data.initial_transcript) {
          inc.transcripts.push({ text: data.initial_transcript, type: 'initial' });
          if (activeIncidentId === data.incident_id) addTranscriptEntry(data.initial_transcript, 'initial');
        }
      }
    }

    if (data.type === 'transcript') {
      const id = data.incident_id;
      const inc = incidents[id];
      if (!inc) return;
      inc.transcripts.push({ text: data.text || '', type: 'normal', ts: data.ts });
      if (activeIncidentId === id) addTranscriptEntry(data.text || '', 'normal', data.ts);
    }

    // Triage update from SSE
    if (data.type === 'triage' || data.triage_level) {
      const id = data.incident_id || activeIncidentId;
      const inc = incidents[id];
      if (inc) {
        inc.data = Object.assign({}, inc.data, data);
        if (activeIncidentId === id) updateTriagePanel(inc.data);
      }
    }
  };

  es.onerror = function() { setConnStatus(false); setTimeout(connectSSE, 3000); };
}

// ─── Poll /incidents ──────────────────────────────────────────────────────────
async function loadIncidents() {
  try {
    const res = await fetch(INC_URL);
    if (!res.ok) return;
    const list = await res.json();
    if (Array.isArray(list)) list.forEach(function(d) { getOrCreateIncident(d); });
  } catch {}
}

// ─── Poll /health ─────────────────────────────────────────────────────────────
async function pollHealth() {
  try {
    const r = await fetch(HEALTH_URL);
    if (!r.ok) return;
    const j = await r.json();
    $sbClients.textContent = j.clients_connected != null ? j.clients_connected : '—';
    $sbGateway.textContent = (j.gateway_url && j.gateway_url !== '(not set)') ? new URL(j.gateway_url).hostname : 'not set';
  } catch {}
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
setConnStatus(false);
connectSSE();
loadIncidents();
setInterval(loadIncidents, 15000);
setInterval(pollHealth, 5000);
pollHealth();
</script>
